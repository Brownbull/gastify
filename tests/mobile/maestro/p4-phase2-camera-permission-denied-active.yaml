appId: com.gastify.mobile
---
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn:
          point: "90%,45%"
      - waitForAnimationToEnd:
          timeout: 5000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- waitForAnimationToEnd:
    timeout: 10000
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000
- swipe:
    direction: UP
- extendedWaitUntil:
    visible:
      id: scan-camera-button
    timeout: 20000
- tapOn:
    id: scan-camera-button
- tapOn:
    text: "Don.t allow"
    optional: true
- tapOn:
    text: "Deny"
    optional: true
- extendedWaitUntil:
    visible:
      id: scan-error-panel
    timeout: 20000
- assertVisible: "Camera permission denied"
- takeScreenshot:
    path: 01-camera-permission-denied
- swipe:
    direction: UP
- extendedWaitUntil:
    visible:
      id: scan-error-reset-button
    timeout: 10000
- tapOn:
    id: scan-error-reset-button
- tapOn:
    id: sign-out-button
- extendedWaitUntil:
    visible:
      id: sign-in-screen
    timeout: 20000
