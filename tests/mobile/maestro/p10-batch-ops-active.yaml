appId: com.gastify.mobile
---
# P10 Phase 2 — Batch operations: select mode toggle, checkbox, batch action bar.

- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn:
          point: "90%,45%"
      - waitForAnimationToEnd:
          timeout: 5000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true

# Sign in if needed
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- waitForAnimationToEnd:
    timeout: 10000
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button

- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000

# Navigate to Transactions
- swipe:
    direction: UP
- extendedWaitUntil:
    visible:
      id: open-ledger-button
    timeout: 20000
- tapOn:
    id: open-ledger-button
- extendedWaitUntil:
    visible:
      id: transactions-screen
    timeout: 30000
- takeScreenshot:
    path: 01-transactions-list

# Enter select mode
- extendedWaitUntil:
    visible:
      id: select-mode-toggle
    timeout: 10000
- tapOn:
    id: select-mode-toggle
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot:
    path: 02-select-mode-active

# Tap first transaction row to select it
- tapOn:
    id: transactions-list
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

# Check batch action bar appears
- extendedWaitUntil:
    visible:
      id: batch-action-bar
    timeout: 5000
- assertVisible:
    id: batch-delete-button
- takeScreenshot:
    path: 03-batch-bar-visible

# Exit select mode
- tapOn:
    id: select-mode-toggle
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot:
    path: 04-select-mode-exited

# Navigate back
- back
- extendedWaitUntil:
    visible:
      id: open-ledger-button
    timeout: 15000
