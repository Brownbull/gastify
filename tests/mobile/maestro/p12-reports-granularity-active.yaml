appId: com.gastify.mobile
---
# Phase 6 Reports GRANULARITY toggle on the S23 (D77) — the on-device runtime proof
# that the period granularity toggle switches month / quarter / year AND the NEW
# ISO-week bucket (D77 #2), each rendering real report cards from the already-deployed
# /insights/series. User A has months of continuous spend, so every granularity
# yields non-empty cards. The category-breakdown donut is month-only (no quarterly/
# annual rollup, D77), so this flow asserts the cards survive each switch and returns
# to month at the end. Runs against deployed staging-e2e.
#
# Requires: dev-client + deployed staging-e2e serving /insights/series with the
# week|month|quarter|year granularity enum (D77 promoted to prod, P58).

- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true

# Reach a clean sign-in + authenticate as user A.
- runFlow:
    when:
      visible:
        id: home-screen
    commands:
      - scrollUntilVisible:
          element:
            id: sign-out-button
      - tapOn:
          id: sign-out-button
      - extendedWaitUntil:
          visible:
            id: sign-in-screen
          timeout: 20000
- extendedWaitUntil:
    visible:
      id: e2e-sign-in-button
    timeout: 30000
- tapOn:
    id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000

# --- Open the Reports screen (defaults to month granularity) ---
- scrollUntilVisible:
    element:
      id: open-reports-button
- tapOn:
    id: open-reports-button
- extendedWaitUntil:
    visible:
      id: reports-screen
    timeout: 20000
- assertNotVisible:
    id: reports-empty
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 01-granularity-month

# --- Switch to WEEK (the D77 ISO-week bucket) → weekly cards render ---
- tapOn:
    id: reports-granularity-week
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: reports-screen
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 02-granularity-week
# The top of the list is the most-recent (currently empty) weeks; scroll down into
# the populated ISO-weeks (user A's May spend lands in earlier weeks of the 3-month
# window) so the artifact shows real per-week totals, not just the $0 leading edge.
- scrollUntilVisible:
    element:
      id: reports-card-8
    timeout: 20000
- takeScreenshot:
    path: 02b-granularity-week-populated
# The toggle shares the scroll container with the cards, so scroll back up to it
# before switching granularity.
- scrollUntilVisible:
    element:
      id: reports-granularity-quarter
    direction: UP
    timeout: 20000

# --- Switch to QUARTER → quarterly cards render ---
- tapOn:
    id: reports-granularity-quarter
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: reports-screen
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 03-granularity-quarter

# --- Switch to YEAR → annual cards render ---
- tapOn:
    id: reports-granularity-year
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: reports-screen
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 04-granularity-year

# --- Back to MONTH → cards still render (round-trip) ---
- tapOn:
    id: reports-granularity-month
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: reports-screen
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 05-granularity-month-roundtrip
