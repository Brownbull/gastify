appId: com.gastify.mobile
---
# Phase 6 Reports screen on the S23 (T10) — the on-device runtime proof that the
# period spending report cards render real data. User A has months of spend (same
# data as the dashboard/trends), so Reports is non-empty and the monthly cards
# render with real totals. Reports reuses the already-deployed /insights/series +
# /insights/monthly (no new backend) + the Phase 4 donut. Runs against deployed
# staging-e2e.
#
# Requires: dev-client + deployed staging-e2e serving /api/v1/insights/*.

- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true

# Reach a clean sign-in + authenticate as user A.
- runFlow:
    when:
      visible:
        id: home-screen
    commands:
      - scrollUntilVisible:
          element:
            id: sign-out-button
      - tapOn:
          id: sign-out-button
      - extendedWaitUntil:
          visible:
            id: sign-in-screen
          timeout: 20000
- extendedWaitUntil:
    visible:
      id: e2e-sign-in-button
    timeout: 30000
- tapOn:
    id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000

# --- Open the Reports screen ---
- scrollUntilVisible:
    element:
      id: open-reports-button
- tapOn:
    id: open-reports-button
- extendedWaitUntil:
    visible:
      id: reports-screen
    timeout: 20000

# A has months of spend -> not the empty state, and the monthly cards render.
- assertNotVisible:
    id: reports-empty
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000
- takeScreenshot:
    path: 01-reports-cards

# Expanding a card keeps the screen alive (the breakdown donut is reused from
# Phase 4; the per-month donut data is covered by the web proof + the dashboard
# S23 proofs, so here we just assert the interaction renders).
- tapOn:
    id: reports-card-0
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: reports-screen
- takeScreenshot:
    path: 02-reports-expanded
