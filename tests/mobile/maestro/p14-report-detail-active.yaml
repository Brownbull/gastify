appId: com.gastify.mobile
---
# Reports v2 Phase 1 — Report Detail screen on the S23. Tapping a month report card
# expands it; "View full breakdown" opens the detail screen with the hierarchical
# store + item grouped breakdown (from the already-deployed /insights/tree, D69) +
# a "view transactions" drill. User A has months of spend so the newest month's tree
# returns real grouped data. No new backend. Runs against deployed staging-e2e.

- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true

# Reach a clean sign-in + authenticate as user A.
- runFlow:
    when:
      visible:
        id: home-screen
    commands:
      - scrollUntilVisible:
          element:
            id: sign-out-button
      - tapOn:
          id: sign-out-button
      - extendedWaitUntil:
          visible:
            id: sign-in-screen
          timeout: 20000
- extendedWaitUntil:
    visible:
      id: e2e-sign-in-button
    timeout: 30000
- tapOn:
    id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000

# --- Open Reports ---
- scrollUntilVisible:
    element:
      id: open-reports-button
- tapOn:
    id: open-reports-button
- extendedWaitUntil:
    visible:
      id: reports-screen
    timeout: 20000
- assertNotVisible:
    id: reports-empty
- extendedWaitUntil:
    visible:
      id: reports-card-0
    timeout: 20000

# Expand a recent month with categorised spend (card-0 is the current month, which
# may be empty mid-month; card-1 is the most recent COMPLETED month → has data), then
# open the full grouped breakdown detail screen.
- tapOn:
    id: reports-card-1
- waitForAnimationToEnd:
    timeout: 3000
- scrollUntilVisible:
    element:
      id: open-report-detail-1
    centerElement: true
- tapOn:
    id: open-report-detail-1
- extendedWaitUntil:
    visible:
      id: report-detail-screen
    timeout: 20000

# Phase 2: the insight block renders (at least the "Top category" trophy — the
# leader falls back to item categories when stores are uncategorised).
- scrollUntilVisible:
    element:
      id: report-detail-insight
    centerElement: true
- assertVisible:
    id: report-detail-highlight-leader

# The hierarchical grouped breakdown renders (store section + group cards).
- assertVisible:
    id: report-detail-store
- scrollUntilVisible:
    element:
      id: report-detail-group
    centerElement: true
- takeScreenshot:
    path: 01-report-detail

# The item-dimension section also renders (its own breakdown).
- scrollUntilVisible:
    element:
      id: report-detail-item
    centerElement: true
- assertVisible:
    id: report-detail-item

# Drill into the period's filtered transactions. "View transactions" sits ABOVE the
# store/item breakdowns, so scroll UP to reach it (the breakdown scroll above moved past
# it — now that "By store" is populated the screen is tall enough for it to leave view).
- scrollUntilVisible:
    element:
      id: report-detail-view-transactions
    direction: UP
    centerElement: true
- tapOn:
    id: report-detail-view-transactions
- extendedWaitUntil:
    visible:
      id: transactions-screen
    timeout: 20000
- takeScreenshot:
    path: 02-drilled-transactions
