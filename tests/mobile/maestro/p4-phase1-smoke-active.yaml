appId: com.gastify.mobile
---
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: sign-in-screen
    timeout: 60000
- assertVisible:
    id: sign-in-screen
- takeScreenshot:
    path: 01-sign-in
- assertVisible:
    id: google-sign-in-button
- tapOn:
    id: e2e-sign-in-button
- assertVisible:
    id: home-screen
- takeScreenshot:
    path: 02-home
- assertVisible:
    id: signed-in-user-panel
# P6 added the insights/ledger card to the home screen, pushing the sign-out
# control below the fold. Scroll it into view before tapping (the panel is
# the last card on the home scroll view).
- scrollUntilVisible:
    element:
      id: sign-out-button
    direction: DOWN
    timeout: 15000
- tapOn:
    id: sign-out-button
- assertVisible:
    id: sign-in-screen
- takeScreenshot:
    path: 03-signed-out
