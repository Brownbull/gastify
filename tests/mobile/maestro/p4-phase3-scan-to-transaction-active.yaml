appId: com.gastify.mobile
---
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn:
          point: "90%,45%"
      - waitForAnimationToEnd:
          timeout: 5000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn:
          point: "90%,45%"
      - waitForAnimationToEnd:
          timeout: 5000
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- waitForAnimationToEnd:
    timeout: 10000
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000
- swipe:
    direction: UP
- extendedWaitUntil:
    visible:
      id: scan-library-button
    timeout: 20000
- tapOn:
    id: scan-library-button
- tapOn:
    text: "Allow all photos"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    point: "16%,50%"
- tapOn:
    text: "Done"
    optional: true
- extendedWaitUntil:
    visible:
      id: scan-image-preview
    timeout: 20000
- takeScreenshot:
    path: 01-phase3-scan-image-selected
- extendedWaitUntil:
    visible:
      id: scan-progress-panel
    timeout: 20000
- takeScreenshot:
    path: 02-phase3-scan-progress
- extendedWaitUntil:
    visible:
      id: scan-result-panel
    timeout: 90000
- swipe:
    direction: UP
- assertVisible: "Scan complete"
- extendedWaitUntil:
    visible:
      id: scan-view-transaction-button
    timeout: 20000
- takeScreenshot:
    path: 03-phase3-scan-complete-view-transaction
- tapOn:
    id: scan-view-transaction-button
- extendedWaitUntil:
    visible:
      id: transaction-detail-screen
    timeout: 30000
- takeScreenshot:
    path: 04-phase3-transaction-detail-from-scan
