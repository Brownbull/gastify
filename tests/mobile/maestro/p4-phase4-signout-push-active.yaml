appId: com.gastify.mobile
---
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn:
          point: "90%,45%"
      - waitForAnimationToEnd:
          timeout: 5000
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Continue"
    optional: true
- runFlow:
    when:
      visible:
        id: e2e-sign-in-button
    commands:
      - tapOn:
          id: e2e-sign-in-button
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: push-registration-panel
    timeout: 20000
- takeScreenshot:
    path: 01-phase4-home-push-panel
- tapOn:
    id: push-register-button
- tapOn:
    text: "Allow"
    optional: true
- extendedWaitUntil:
    visible: "Device registered"
    timeout: 60000
- takeScreenshot:
    path: 02-phase4-push-registered
- tapOn:
    id: push-unregister-button
- extendedWaitUntil:
    visible: "Device unregistered"
    timeout: 30000
- takeScreenshot:
    path: 03-phase4-push-unregistered
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible:
      id: sign-out-button
    timeout: 10000
- tapOn:
    id: sign-out-button
- extendedWaitUntil:
    visible:
      id: sign-in-screen
    timeout: 30000
- takeScreenshot:
    path: 04-phase4-signed-out
