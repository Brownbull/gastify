name: CI

on:
  pull_request:
    branches: [main, staging, 'rebuild/**']
  push:
    branches: [main, staging, 'rebuild/main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # These validate the DEPLOYED web app (web/ — React 19 + Vite 8), not the retired
  # legacy frontend/ (React 18). web/ needs node >=22.12 (Vite 8) + --legacy-peer-deps;
  # `npm ci` also catches package-lock drift (the gap that took prod down — P80).
  web-typecheck:
    name: Web Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc -b

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run check:token-classes

  web-test:
    name: Web Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  mobile-typecheck:
    name: Mobile Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  mobile-test:
    name: Mobile Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test

  mobile-api-drift:
    name: Mobile API Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: cd backend && uv sync --frozen
      - run: cd mobile && npm ci
      - run: cd mobile && npm run generate:api
      - run: git diff --exit-code -- mobile/src/lib/openapi-spec.json mobile/src/lib/api-types.d.ts

  mobile-audit:
    name: Mobile Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # A throwaway Postgres so the RLS-enforced isolation tests actually RUN
    # (test_rls_postgres.py + the Phase 5 test_group_isolation.py "user A cannot
    # read group B" gate, D70). They self-create a NON-superuser role from this
    # superuser admin DSN; without it the suite skips them and the isolation
    # proof is theoretical.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gastify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest --cov=app --cov-fail-under=80
        env:
          GASTIFY_TEST_PG_DSN: postgresql://postgres:postgres@127.0.0.1:5432/gastify_test
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    name: Backend Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run mypy app/ --no-error-summary

  security-gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-sca:
    name: SCA Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd backend && uv sync --frozen && uv run pip-audit
      - run: cd web && npm ci --legacy-peer-deps && npm audit --audit-level=high

  custom-gates:
    name: Custom Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run custom CI gates
        run: |
          for script in scripts/ci/check-*.sh; do
            echo "=== Running $script ==="
            bash "$script" || exit 1
          done
