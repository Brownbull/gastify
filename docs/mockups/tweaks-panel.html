<link rel="stylesheet" href="../tokens.css">
<style>
  #tweaks-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 280px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    z-index: 9999;
    overflow-y: auto;
    font-family: var(--font-body);
    font-size: var(--fs-sm);
    color: var(--text);
    transition: width var(--d-2) var(--ease-out);
  }
  body.tweaks-collapsed #tweaks-panel { width: 48px; }
  body.tweaks-collapsed #tweaks-panel .tweaks__body { display: none; }

  .tweaks__toggle {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--text);
  }

  .tweaks__body { padding: 56px 16px 16px; }
  .tweaks__header {
    font-family: var(--font-display);
    font-size: var(--fs-xs);
    font-weight: var(--fw-semibold);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--secondary);
    margin-bottom: var(--s-4);
  }
  .tweaks__group { margin-bottom: var(--s-5); }
  .tweaks__group h3 {
    font-size: var(--fs-xs);
    font-weight: var(--fw-semibold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--secondary);
    margin: 0 0 var(--s-2);
  }
  .tweaks__row { display: flex; gap: var(--s-1); flex-wrap: wrap; }

  .tweaks__chip {
    flex: 1 1 auto;
    min-width: 60px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: var(--fs-xs);
    font-family: inherit;
  }
  .tweaks__chip.is-active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .tweaks__chip:hover:not(.is-active) { background: var(--bg-tertiary); }

  .tweaks__color { width: 100%; height: 32px; border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; }
  .tweaks__reset { margin-top: 6px; padding: 4px 8px; font-size: var(--fs-xs); border: 1px solid var(--border); background: transparent; color: var(--secondary); border-radius: var(--r-sm); cursor: pointer; }
  .tweaks__select { width: 100%; padding: 6px 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: var(--r-md); font-size: var(--fs-xs); font-family: inherit; }
  .tweaks__range { width: 100%; }
  .tweaks__group code { font-family: var(--font-mono); font-size: 0.8em; color: var(--primary); }

  /* State-tabs styling (used by .state-tabs[role="tablist"]) */
  .state-tabs {
    display: flex;
    gap: var(--s-1);
    flex-wrap: wrap;
    padding: var(--s-3);
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
  }
  .state-tabs .state-tab {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--r-full);
    cursor: pointer;
    font-size: var(--fs-xs);
    font-family: inherit;
  }
  .state-tabs .state-tab.is-active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .state-content { display: none; }
  .state-content.active { display: block; }

  /* Make sure screen content isn't hidden behind panel on desktop */
  @media (min-width: 960px) {
    body:not(.tweaks-collapsed) { padding-right: 280px; }
    body.tweaks-collapsed { padding-right: 48px; }
  }
</style>

<div id="tweaks-panel"></div>

<script src="../tweaks.js" defer></script>
